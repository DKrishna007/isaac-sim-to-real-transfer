# Domain Randomization Parameters for Isaac Sim
# Used for YOLOv8 zero-shot sim-to-real transfer
# All ranges are sampled uniformly per episode unless noted

domain_randomization:

  # ─── Lighting ────────────────────────────────────────────────
    lighting:
        # Ambient (hemisphere) light
            ambient_intensity:
                  min: 0.3
                        max: 1.8
                              unit: normalized
                                  ambient_color_temp:
                                        min: 3000    # warm tungsten
                                              max: 6500    # cool daylight
                                                    unit: kelvin

                                                        # Directional (sun) light
                                                            directional_light:
                                                                  enabled: true
                                                                        intensity:
                                                                                min: 0.2
                                                                                        max: 1.5
                                                                                              azimuth_deg:
                                                                                                      min: 0
                                                                                                              max: 360
                                                                                                                    elevation_deg:
                                                                                                                            min: 15
                                                                                                                                    max: 75
                                                                                                                                    
                                                                                                                                        # Point lights (warehouse fixtures)
                                                                                                                                            point_lights:
                                                                                                                                                  count:
                                                                                                                                                          min: 2
                                                                                                                                                                  max: 8
                                                                                                                                                                        intensity:
                                                                                                                                                                                min: 0.1
                                                                                                                                                                                        max: 0.9
                                                                                                                                                                                              radius_m:
                                                                                                                                                                                                      min: 2.0
                                                                                                                                                                                                              max: 8.0
                                                                                                                                                                                                                    flicker_probability: 0.05   # 5% chance per light
                                                                                                                                                                                                                    
                                                                                                                                                                                                                        # Shadows
                                                                                                                                                                                                                            shadow_softness:
                                                                                                                                                                                                                                  min: 0.0
                                                                                                                                                                                                                                        max: 1.0
                                                                                                                                                                                                                                            shadow_enabled_probability: 0.85
                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                              # ─── Camera / Sensor ─────────────────────────────────────────
                                                                                                                                                                                                                                                camera:
                                                                                                                                                                                                                                                    # Exposure simulation
                                                                                                                                                                                                                                                        exposure_ev:
                                                                                                                                                                                                                                                              min: -1.0
                                                                                                                                                                                                                                                                    max: 1.5
                                                                                                                                                                                                                                                                        exposure_noise_sigma: 0.05
                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                            # Lens distortion (Brown-Conrady model k1,k2)
                                                                                                                                                                                                                                                                                radial_distortion:
                                                                                                                                                                                                                                                                                      k1:
                                                                                                                                                                                                                                                                                              min: -0.05
                                                                                                                                                                                                                                                                                                      max: 0.05
                                                                                                                                                                                                                                                                                                            k2:
                                                                                                                                                                                                                                                                                                                    min: -0.02
                                                                                                                                                                                                                                                                                                                            max: 0.02
                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                # Noise
                                                                                                                                                                                                                                                                                                                                    gaussian_noise_sigma:
                                                                                                                                                                                                                                                                                                                                          min: 0.0
                                                                                                                                                                                                                                                                                                                                                max: 0.02
                                                                                                                                                                                                                                                                                                                                                    salt_pepper_density:
                                                                                                                                                                                                                                                                                                                                                          min: 0.0
                                                                                                                                                                                                                                                                                                                                                                max: 0.002
                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                    # Motion blur
                                                                                                                                                                                                                                                                                                                                                                        motion_blur:
                                                                                                                                                                                                                                                                                                                                                                              enabled_probability: 0.3
                                                                                                                                                                                                                                                                                                                                                                                    max_length_px: 4
                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                        # White balance jitter
                                                                                                                                                                                                                                                                                                                                                                                            white_balance_shift_rgb:
                                                                                                                                                                                                                                                                                                                                                                                                  r: [-0.08, 0.08]
                                                                                                                                                                                                                                                                                                                                                                                                        g: [-0.05, 0.05]
                                                                                                                                                                                                                                                                                                                                                                                                              b: [-0.08, 0.08]
                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                # ─── Textures / Materials ────────────────────────────────────
                                                                                                                                                                                                                                                                                                                                                                                                                  materials:
                                                                                                                                                                                                                                                                                                                                                                                                                      # Floor textures (50 PBR textures loaded)
                                                                                                                                                                                                                                                                                                                                                                                                                          floor_texture:
                                                                                                                                                                                                                                                                                                                                                                                                                                library_size: 50
                                                                                                                                                                                                                                                                                                                                                                                                                                      categories:
                                                                                                                                                                                                                                                                                                                                                                                                                                              - concrete
                                                                                                                                                                                                                                                                                                                                                                                                                                                      - epoxy_painted
                                                                                                                                                                                                                                                                                                                                                                                                                                                              - rubber_tile
                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - wood_pallet
                                                                                                                                                                                                                                                                                                                                                                                                                                                                              - metal_grid
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    roughness:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            min: 0.2
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    max: 0.95
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          tiling_scale:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  min: 0.5
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          max: 3.0
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              # Object albedo jitter (multiplicative)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  object_albedo_jitter:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        enabled: true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              hue_shift_deg:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      min: -15
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              max: 15
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    saturation_scale:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            min: 0.7
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    max: 1.3
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          value_scale:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  min: 0.7
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          max: 1.3
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              # Metallic / specular variation
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  metallic_jitter:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        min: -0.1
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              max: 0.1
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                # ─── Object Placement ────────────────────────────────────────
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  object_placement:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      # Position jitter around canonical placement
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          position_jitter_m:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                x: 0.3
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      y: 0.3
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            z: 0.0   # keep on floor
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                # Rotation jitter (yaw only for floor objects)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    rotation_jitter_deg:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          yaw: 45.0
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                pitch: 2.0   # slight tilt
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      roll: 2.0
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          # Scale jitter
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              scale_jitter:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    min: 0.85
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          max: 1.15
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                uniform: true   # same scale on all axes
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    # Occlusion augmentation
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        occlusion:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              enabled: true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    max_occluders_per_object: 2
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          occluder_types:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - random_box
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          - random_cylinder
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                occlusion_fraction:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        min: 0.0
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                max: 0.4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  # ─── LiDAR Sensor Noise ──────────────────────────────────────
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    lidar:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        # Range noise
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            range_noise_sigma_m: 0.02
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                range_bias_m:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      min: -0.01
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            max: 0.01
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                # Missing returns
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    dropout_probability: 0.02   # 2% of points dropped
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        # Angular jitter
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            angle_jitter_deg: 0.05
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                # Intensity noise
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    intensity_noise_sigma: 0.03
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      # ─── Environment Objects (Distractors) ───────────────────────
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        distractors:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            enabled: true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                count:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      min: 0
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            max: 5
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                types:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - random_primitive
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - warehouse_debris
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - small_crate
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      placement:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            zone: random   # anywhere not overlapping main objects
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              # ─── Physics ─────────────────────────────────────────────────
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                physics:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    # Slight physics perturbation (small items on conveyors)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        gravity_jitter:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              min: -0.05
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    max: 0.05
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          unit: m/s2
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              restitution:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    min: 0.1
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          max: 0.6
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              friction:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    min: 0.3
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          max: 0.9
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          # ─── Training Schedule ─────────────────────────────────────────
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          training:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            total_synthetic_images: 12400
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              validation_images: 2100
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                episodes_per_image: 1      # re-randomize each frame
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  augmentation_on_top:       # additional Albumentations augmentations
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      horizontal_flip: true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          vertical_flip: false
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              random_crop: true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  mosaic: true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      mixup: true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      # ─── Isaac Sim Version ─────────────────────────────────────────
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      isaac_sim_version: "2023.1.1"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      omniverse_kit_version: "105.1"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      render_mode: RTX_REAL_TIME
